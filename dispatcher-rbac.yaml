apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dispatcher-job-creator
  namespace: local
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]

  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dispatcher-job-creator-binding
  namespace: local
subjects:
  - kind: ServiceAccount
    name: dispatcher-sa
    namespace: local
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dispatcher-job-creator